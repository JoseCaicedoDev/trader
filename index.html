<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Antigravity Backtester | Estrategia Unificada Wyckoff BTC/USDT</title>
  <meta name="description" content="Dashboard premium de backtesting de la estrategia unificada Wyckoff + confluencia de RSI Estocástico sobre BTC/USDT usando la API pública de Binance y gráficos interactivos de TradingView.">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap">
  
  <!-- Tailwind CSS v4 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <!-- Custom theme configuration and custom utilities in Tailwind -->
  <style type="text/tailwindcss">
    @theme {
      --color-dark-bg: #06080f;          /* Pitch black for deep contrast */
      --color-dark-sidebar: #0b0e17;     /* Very dark blue-gray for sidebar separation */
      --color-dark-card: rgba(15, 22, 38, 0.7); /* Translucent cards */
      --color-neon-cyan: #00e5ff;
      --color-neon-emerald: #00e676;
      --color-neon-rose: #ff1744;
      --color-neon-purple: #b388ff;
    }
    
    @utility glass-card {
      background-color: var(--color-dark-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }
    
    /* Scrollbars styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.25);
    }
    @keyframes slide-in {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .animate-slide-in {
      animation: slide-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-dark-bg text-gray-100 h-screen overflow-hidden font-['Outfit'] antialiased relative flex flex-col">

  <!-- Background Glowing Orbs (Corrected Stacking Context: z-0 behind relative z-10 content) -->
  <div class="absolute w-[600px] h-[600px] rounded-full bg-neon-cyan/15 blur-[150px] pointer-events-none top-0 right-0 z-0"></div>
  <div class="absolute w-[600px] h-[600px] rounded-full bg-neon-purple/15 blur-[150px] pointer-events-none bottom-10 left-0 z-0"></div>
  <div class="absolute w-[400px] h-[400px] rounded-full bg-neon-emerald/8 blur-[130px] pointer-events-none top-[35%] left-[25%] z-0"></div>

  <!-- Strategy Switcher: choose between the main Wyckoff-unified system and a simpler VWAP + EMA21/50
       crossover reference strategy, each with its own chart, sidebar and metrics. -->
  <nav class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-4 px-4 lg:px-8 pt-4">
    <!-- Strategy Switcher (Left) -->
    <div class="flex items-center gap-2 flex-wrap">
      <button type="button" data-strategy="wyckoff" class="strategy-tab-btn active-strategy-tab flex items-center gap-2 text-sm font-bold px-4 py-2.5 rounded-lg bg-neon-cyan/15 text-neon-cyan border border-neon-cyan/25 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        Wyckoff Unificado
      </button>
      <button type="button" data-strategy="emacross" class="strategy-tab-btn flex items-center gap-2 text-sm font-bold px-4 py-2.5 rounded-lg bg-white/5 text-gray-400 border border-white/8 hover:text-gray-200 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        VWAP + Cruce EMA 21/30
      </button>
      <button type="button" data-strategy="eth" class="strategy-tab-btn flex items-center gap-2 text-sm font-bold px-4 py-2.5 rounded-lg bg-white/5 text-gray-400 border border-white/8 hover:text-gray-200 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
        VWAP + EMA — ETH/USDT
      </button>
      <button type="button" data-strategy="oraclemove" class="strategy-tab-btn flex items-center gap-2 text-sm font-bold px-4 py-2.5 rounded-lg bg-white/5 text-gray-400 border border-white/8 hover:text-gray-200 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Oracle Move — BTC/USDT
      </button>
    </div>

    <!-- Global Alert Settings (Right) -->
    <div class="flex items-center gap-2 bg-dark-sidebar/40 border border-white/8 rounded-xl px-3 py-1.5 backdrop-blur-sm select-none">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-neon-cyan animate-swing origin-top"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
      <span class="text-gray-300 text-xs font-bold uppercase tracking-wide mr-1">Alertas:</span>
      <label class="relative inline-flex items-center cursor-pointer">
        <input type="checkbox" class="chk-alert-sound sr-only peer" checked>
        <div class="w-7 h-3.5 bg-gray-600 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[1px] after:left-[1px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-2.5 after:w-2.5 after:transition-all peer-checked:bg-neon-cyan relative"></div>
      </label>
    </div>
  </nav>

  <!-- Dynamic App container where strategy views will be instantiated -->
  <main id="app-container" class="relative z-10 flex-1 min-h-0 w-full"></main>

  <!-- Reusable HTML5 Component Template for Strategy Views -->
  <template id="strategy-view-template">
    <div class="strategy-view flex flex-col lg:flex-row h-full relative z-10 hidden">

      <!-- Sidebar: live signal state + key metrics -->
      <aside class="w-full lg:w-[340px] shrink-0 bg-dark-sidebar/60 border-b lg:border-b-0 lg:border-r border-white/8 p-4 lg:p-5 flex flex-col gap-5 lg:h-full lg:overflow-y-auto">
        <div class="flex items-center gap-3">
          <svg class="strategy-icon h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></svg>
          <h1 class="strategy-title text-lg font-bold tracking-wide bg-gradient-to-r bg-clip-text text-transparent"></h1>
        </div>

        <!-- Status Indicators -->
        <div class="flex flex-col gap-2.5">
          <div class="live-price-badge flex items-center gap-2.5 text-xs bg-white/5 py-2 px-4 rounded-full border border-white/8 backdrop-blur-sm">
            <span class="live-price-dot w-2 h-2 rounded-full inline-block bg-gray-500"></span>
            <span class="live-price-label text-gray-400 font-medium">BTC/USDT en vivo</span>
            <span class="live-price-value font-bold tabular-nums text-gray-200 ml-auto">—</span>
          </div>
          <div class="flex items-center gap-2.5 text-xs bg-white/5 py-2 px-4 rounded-full border border-white/8 backdrop-blur-sm">
            <span class="status-dot w-2.5 h-2.5 rounded-full inline-block"></span>
            <span class="status-text text-gray-300 font-medium">Conectando...</span>
          </div>
        </div>



        <!-- Live Signal State Checklist -->
        <section class="glass-card rounded-xl p-4 flex flex-col gap-3.5">
          <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="signal-icon"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            <h2 class="text-xs font-bold tracking-tight text-white uppercase">Estado de la Señal</h2>
            <span class="signal-live-dot w-1.5 h-1.5 rounded-full inline-block bg-gray-600"></span>
          </div>
          <span class="signal-event-badge text-xs font-semibold px-2.5 py-1 rounded-full bg-white/5 text-gray-400 border border-white/8 w-fit hidden">Sin evento Wyckoff activo</span>
          <div class="grid grid-cols-1 gap-2 text-xs">
            <div class="chk-vwap-row flex items-center gap-2 bg-black/30 rounded-lg p-2.5 border border-white/5">
              <span class="chk-vwap-dot w-2 h-2 rounded-full inline-block bg-gray-600 shrink-0"></span>
              <span class="text-gray-400">VWAP: <span class="chk-vwap-text text-gray-300 font-medium">—</span></span>
            </div>
            <div class="flex items-center gap-2 bg-black/30 rounded-lg p-2.5 border border-white/5">
              <span class="chk-ema-dot w-2 h-2 rounded-full inline-block bg-gray-600 shrink-0"></span>
              <span class="text-gray-400">Estructura: <span class="chk-ema-text text-gray-300 font-medium">—</span></span>
            </div>
            <!-- Stochastic Row (Shown for Wyckoff, hidden for EMA Cross) -->
            <div class="chk-stoch-row flex items-center gap-2 bg-black/30 rounded-lg p-2.5 border border-white/5 hidden">
              <span class="chk-stoch-dot w-2 h-2 rounded-full inline-block bg-gray-600 shrink-0"></span>
              <span class="text-gray-400">Estocástico: <span class="chk-stoch-text text-gray-300 font-medium">—</span></span>
            </div>
            <div class="flex items-center gap-2 bg-black/30 rounded-lg p-2.5 border border-white/5">
              <span class="chk-position-dot w-2 h-2 rounded-full inline-block bg-gray-600 shrink-0"></span>
              <span class="text-gray-400">Posición: <span class="chk-position-text text-gray-300 font-medium">Sin posición</span></span>
            </div>
          </div>
          <div class="signal-position-detail hidden text-xs bg-black/30 rounded-lg p-3 border border-white/5 flex flex-col gap-1.5 font-mono">
            <span>Entrada: <span class="pos-entry text-gray-200">-</span></span>
            <span>Stop Loss: <span class="pos-sl text-neon-rose">-</span></span>
            <span>Take Profit: <span class="pos-tp text-neon-emerald">-</span></span>
            <span>P&L flotante: <span class="pos-pnl text-gray-200">-</span></span>
          </div>
        </section>

        <!-- Metrics Summaries -->
        <section class="grid grid-cols-2 gap-3">
          <div class="glass-card rounded-xl p-4 flex flex-col gap-1.5">
            <span class="text-[11px] font-semibold text-gray-400 flex items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="metric-icon"><line x1="19" x2="5" y1="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
              Retorno Total
            </span>
            <span class="metric-return text-xl font-bold tracking-tight tabular-nums">0.00%</span>
            <span class="metric-return-abs text-[11px] text-gray-500 font-medium">$0.00 netas</span>
          </div>

          <div class="glass-card rounded-xl p-4 flex flex-col gap-1.5">
            <span class="text-[11px] font-semibold text-gray-400 flex items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="metric-icon"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
              Acierto
            </span>
            <span class="metric-winrate text-xl font-bold tracking-tight tabular-nums">0.0%</span>
            <span class="text-[11px] text-gray-500 font-medium">En ganancia</span>
          </div>

          <div class="glass-card rounded-xl p-4 flex flex-col gap-1.5">
            <span class="text-[11px] font-semibold text-gray-400 flex items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="metric-icon"><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></svg>
              Transacciones
            </span>
            <span class="metric-trades text-xl font-bold tracking-tight tabular-nums text-white">0</span>
            <span class="text-[11px] text-gray-500 font-medium">Finalizadas</span>
          </div>

          <div class="glass-card rounded-xl p-4 flex flex-col gap-1.5">
            <span class="text-[11px] font-semibold text-gray-400 flex items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="metric-icon"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>
              Drawdown Máx.
            </span>
            <span class="metric-drawdown text-xl font-bold tracking-tight tabular-nums">0.00%</span>
            <span class="text-[11px] text-gray-500 font-medium">Caída máxima</span>
          </div>

          <div class="glass-card rounded-xl p-4 flex flex-col gap-1.5 col-span-2">
            <span class="text-[11px] font-semibold text-gray-400 flex items-center gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="metric-icon"><line x1="22" x2="2" y1="5" y2="5"/><line x1="12" x2="12" y1="2" y2="22"/><path d="M5 5a7 7 0 0 0 14 0"/><path d="M19 17A7 7 0 1 1 5 17"/></svg>
              Profit Factor
            </span>
            <span class="metric-factor text-xl font-bold tracking-tight tabular-nums">0.00</span>
            <span class="text-[11px] text-gray-500 font-medium">Ratio Ganancia vs Pérdida</span>
          </div>
        </section>
      </aside>

      <!-- Main Dashboard Area: charts get the spotlight -->
      <div class="flex-1 p-4 lg:p-8 flex flex-col gap-6 overflow-hidden h-full w-full">
        <!-- Tab Navigation -->
        <div class="flex items-center gap-2 border-b border-white/8" role="tablist">
          <button type="button" data-tab="chart" role="tab" class="tab-btn active-tab flex items-center gap-2 text-sm font-semibold px-4 py-2.5 -mb-px border-b-2 text-white transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5v4"/><rect width="4" height="10" x="7" y="9" rx="1"/><path d="M9 19v2"/><path d="M17 3v2"/><rect width="4" height="8" x="15" y="5" rx="1"/><path d="M17 13v8"/><path d="M3 3v18h18"/></svg>
            Gráfico de Precios
          </button>
          <button type="button" data-tab="equity" role="tab" class="tab-btn flex items-center gap-2 text-sm font-semibold px-4 py-2.5 -mb-px border-b-2 border-transparent text-gray-400 hover:text-gray-200 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            Equity Curve
          </button>
          <button type="button" data-tab="history" role="tab" class="tab-btn flex items-center gap-2 text-sm font-semibold px-4 py-2.5 -mb-px border-b-2 border-transparent text-gray-400 hover:text-gray-200 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            Historial de Operaciones
          </button>
        </div>

        <!-- Tab Panel: Price Chart -->
        <section data-tab-panel="chart" class="glass-card rounded-xl p-6 flex flex-col gap-5">
          <div class="flex justify-between items-center flex-wrap gap-4">
            <div class="flex items-center gap-2.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="main-chart-icon"><path d="M9 5v4"/><rect width="4" height="10" x="7" y="9" rx="1"/><path d="M9 19v2"/><path d="M17 3v2"/><rect width="4" height="8" x="15" y="5" rx="1"/><path d="M17 13v8"/><path d="M3 3v18h18"/></svg>
              <h2 class="text-lg font-bold tracking-tight text-white">Gráfico de Precios y Señales de Entrada</h2>
            </div>
            <div class="flex gap-4 text-xs font-medium flex-wrap">
              <div class="flex items-center gap-1.5 text-gray-400">
                <span class="w-2.5 h-2.5 rounded-[2px] bg-neon-emerald inline-block"></span>
                <span>Abrir/Cerrar en Ganancia</span>
              </div>
              <div class="flex items-center gap-1.5 text-gray-400">
                <span class="w-2.5 h-2.5 rounded-[2px] bg-neon-rose inline-block"></span>
                <span>Abrir Short/Cerrar en Pérdida</span>
              </div>
            </div>
          </div>

          <!-- Primary Price Candlestick Chart Container -->
          <div class="main-chart relative w-full h-[680px] bg-black/50 rounded-lg overflow-hidden border border-white/5">
            <!-- Loading overlay for charts -->
            <div class="main-overlay absolute inset-0 bg-[#080b11]/90 flex flex-col justify-center items-center gap-4 z-50 backdrop-blur-[5px] transition-opacity duration-300">
              <div class="overlay-spinner w-10 h-10 border-3 border-neon-cyan/10 rounded-full animate-spin"></div>
              <p class="overlay-message text-sm text-gray-400 font-medium tracking-wide">Conectando...</p>
            </div>
          </div>
        </section>

        <!-- Tab Panel: Equity Curve -->
        <section data-tab-panel="equity" class="hidden glass-card rounded-xl p-6 flex-col gap-5">
          <div class="flex items-center gap-2.5">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="equity-chart-icon"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
            <h2 class="text-lg font-bold tracking-tight text-white">Curva de Crecimiento del Capital (Equity Curve)</h2>
          </div>
          <div class="equity-chart relative w-full h-[600px] bg-black/50 rounded-lg overflow-hidden border border-white/5"></div>
        </section>

        <!-- Tab Panel: Trade History -->
        <section data-tab-panel="history" class="hidden glass-card rounded-xl p-6 flex-col gap-4">
          <div class="flex justify-between items-center">
            <h2 class="text-lg font-bold tracking-tight text-white">Historial de Operaciones</h2>
          </div>
          <div class="overflow-auto max-h-[600px] lg:max-h-[650px]">
            <table class="w-full text-left text-sm border-collapse">
              <thead>
                <tr class="sticky top-0 bg-[#121827] text-gray-300 font-semibold border-b border-white/10 z-10 select-none">
                  <th class="p-3">Dirección</th>
                  <th class="p-3">Entrada</th>
                  <th class="p-3">Evento Entrada</th>
                  <th class="p-3">Precio Entrada</th>
                  <th class="p-3">Salida</th>
                  <th class="p-3">Motivo Salida</th>
                  <th class="p-3">Precio Salida</th>
                  <th class="p-3">Resultado (P&L)</th>
                  <th class="p-3">Saldo de Cuenta</th>
                </tr>
              </thead>
              <tbody class="trades-table-body divide-y divide-white/5">
                <!-- Dynamically populated via JS -->
                <tr>
                  <td colspan="9" class="text-center text-gray-500 py-8">
                    Ejecute una simulación para ver los resultados...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </div>

    </div>
  </template>

  <!-- Toast Container for active alerts -->
  <div id="toast-container" class="fixed bottom-5 right-5 z-[999] flex flex-col gap-3 max-w-sm pointer-events-auto"></div>

  <!-- TradingView Lightweight Charts (Standalone version) -->
  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

  <!-- App scripts, split by concern (see js/main.js for the entry point). Classic scripts sharing
       one global scope on purpose — plain static hosting, no bundler — so load order matters and
       encodes the dependency graph documented at the top of each file. -->
  <script src="js/config.js"></script>
  <script src="js/indicators.js"></script>
  <script src="js/simulator.js"></script>
  <script src="js/strategy-wyckoff.js"></script>
  <script src="js/strategy-emacross.js"></script>
  <script src="js/strategy-oraclemove.js"></script>
  <script src="js/binance-api.js"></script>
  
  <!-- Layer 3 DOM Utilities -->
  <script src="js/ui/dom-utils.js"></script>
  
  <!-- Layer 2 Infrastructure -->
  <script src="js/chart/chart-manager.js"></script>
  <script src="js/live-feed.js"></script>
  
  <!-- Layer 3 UI Components -->
  <script src="js/ui/metrics-panel.js"></script>
  <script src="js/ui/signal-panel.js"></script>
  <script src="js/ui/trades-table.js"></script>
  <script src="js/ui/strategy-view.js"></script>
  <script src="js/alerts.js"></script>
  
  <!-- Layer 4 App Bootstrap -->
  <script src="js/app/main.js"></script>
</body>
</html>
